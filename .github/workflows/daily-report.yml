name: OSRS Daily Update

on:
  schedule:
    - cron: '30 7 * * *' # 07:30 UTC daily
  workflow_dispatch: {}

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: |
          cd $GITHUB_WORKSPACE/OSRS-Daily-Update
          npm install

      - name: Run report
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          WOM_PLAYER: TFrog98
          WOM_USER_AGENT: Datphoria
        run: |
          cd $GITHUB_WORKSPACE/OSRS-Daily-Update
          node scripts/wiseoldman-report.js
